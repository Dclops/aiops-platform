apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aiops-operator
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aiops-operator
subjects:
- kind: ServiceAccount
  name: aiops-operator
  namespace: default
roleRef:
  kind: ClusterRole
  name: aiops-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-operator
  template:
    metadata:
      labels:
        app: aiops-operator
    spec:
      serviceAccountName: aiops-operator
      containers:
      - name: operator
        image: aiops-operator:latest
        imagePullPolicy: Never
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus-server.default.svc.cluster.local"
        - name: TARGET_DEPLOYMENT
          value: "demo-app"
        - name: TARGET_NAMESPACE
          value: "default"
        - name: CHECK_INTERVAL
          value: "10"
